<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Situation d'écriture de Cassie — Une affiche pour la fête de fin d'année</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pepitorino-dev/Devoirs@main/devoir-engine.css">
</head>
<body class="de-body">
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/gh/pepitorino-dev/Devoirs@main/devoir-engine.js"></script>
  <script>

const d = Devoir.creer({
  cible: '#app',
  eleve: 'Cassie',
  type: 'situation',
  matiere: "Français, langue d'enseignement",
  sujet: "Situation d'écriture — 3<sup>e</sup> trimestre",
  niveau: '4<sup>e</sup> année',
  cycle: '2<sup>e</sup> cycle du primaire',
  difficulte: 'Moyen',
  objectif: "Écrire une affiche qui informe ET convainc les autres élèves de venir à la fête de fin d'année : "
          + "choisir des mots forts, utiliser des verbes d'action et l'impératif, présenter clairement les informations.",
  total: 40,
  storageKey: 'situation_cassie_fr_S3_moyen',
  theme: 'default'
});

// ---------- Mise en situation ----------
d.exercice(0, "🎉 La grande mission du comité d'élèves", 0)
  .histoire([
    "C'est bientôt la fin de l'année scolaire et toute l'école attend avec impatience la grande fête de fin d'année ! Cette année, c'est TA classe qui a la responsabilité d'organiser la promotion de l'événement.",
    "Le comité d'élèves vient de te confier une mission importante : créer une affiche pour convaincre tous les élèves de l'école de venir à la fête. L'affiche sera collée dans les corridors, à la cafétéria et près du gymnase.",
    "Voici les informations que le comité te donne : la fête aura lieu le vendredi 19 juin, de 13 h à 15 h, dans la cour d'école. Au programme : jeux gonflables, kiosque de maquillage, course à relais, kiosque de barbe à papa et un grand karaoké.",
    "Ton défi : ton affiche doit donner toutes les informations importantes ET donner envie aux autres élèves de venir. Il faut que ce soit clair, joyeux et accrocheur !"
  ])
  .intro('<p style="margin-top:14px;color:#5C5A53;font-style:italic;">Tu vas faire 5 tâches qui vont t\'aider à préparer ton affiche. À la dernière tâche, tu rédigeras ton affiche au complet ! ✏️</p>');

// ---------- Tâche 1 — Analyser une affiche-modèle ----------
d.exercice(1, "Tâche 1 — J'observe une affiche-modèle", 8)
  .consigne("Voici une affiche que le comité a trouvée. Observe-la bien, puis réponds aux questions.")
  .intro(
    '<div style="background:#FFF9EC;border:2px dashed #C99846;border-radius:14px;padding:18px;margin:10px 0;text-align:center;font-family:Fraunces,Georgia,serif;">'
    + '<div style="font-size:1.8em;font-weight:900;color:#C2543A;line-height:1.1;">🍂 GRAND RASSEMBLEMENT D\'AUTOMNE ! 🍂</div>'
    + '<div style="font-size:1.1em;margin-top:10px;color:#2B2A26;">Viens t\'amuser avec nous !</div>'
    + '<div style="margin-top:14px;font-weight:700;color:#2B2A26;">📅 Samedi 12 octobre &nbsp;•&nbsp; ⏰ 10 h à 14 h</div>'
    + '<div style="margin-top:6px;font-weight:700;color:#2B2A26;">📍 Parc des Pommiers</div>'
    + '<div style="margin-top:14px;font-size:1.05em;color:#5C7A3E;font-weight:700;">🎪 Jeux gonflables &nbsp;•&nbsp; 🍎 Tire sur la neige &nbsp;•&nbsp; 🎨 Kiosque de bricolage</div>'
    + '<div style="margin-top:12px;font-style:italic;color:#C2543A;font-weight:700;">Apporte tes amis et passe une journée magique !</div>'
    + '</div>'
  )
  .texte("<span class=\"de-letter\">a)</span> Quel est le titre de cette affiche ?", 's3_t1a')
  .texte("<span class=\"de-letter\">b)</span> Quand a lieu l'événement (date et heure) ?", 's3_t1b')
  .texte("<span class=\"de-letter\">c)</span> Où se passe l'événement ?", 's3_t1c')
  .texte("<span class=\"de-letter\">d)</span> Nomme 2 mots qui donnent envie de venir.", 's3_t1d');

// ---------- Tâche 2 — Cocher les 4 informations essentielles ----------
d.exercice(2, "Tâche 2 — Je choisis les informations essentielles", 6)
  .consigne("Pour chaque information, écris VRAI si elle DOIT absolument être sur ton affiche, ou FAUX si elle n'est pas nécessaire.")
  .vraiFaux([
    { label: '<span class="de-letter">a)</span> La date de la fête (vendredi 19 juin).', key:'s3_t2a' },
    { label: '<span class="de-letter">b)</span> Le nom de la directrice de l\'école.', key:'s3_t2b' },
    { label: '<span class="de-letter">c)</span> L\'heure de début et de fin (13 h à 15 h).', key:'s3_t2c' },
    { label: '<span class="de-letter">d)</span> Le nombre d\'élèves dans ta classe.', key:'s3_t2d' },
    { label: '<span class="de-letter">e)</span> Le lieu de la fête (la cour d\'école).', key:'s3_t2e' },
    { label: '<span class="de-letter">f)</span> Les activités prévues (jeux gonflables, karaoké…).', key:'s3_t2f' }
  ]);

// ---------- Tâche 3 — Vocabulaire accrocheur ----------
d.exercice(3, "Tâche 3 — Je cherche des mots qui donnent envie", 8)
  .consigne("Pour rendre ton affiche convaincante, choisis dans la liste ci-dessous 4 ADJECTIFS qui décrivent une fête réussie. Touche les mots pour les sélectionner.")
  .motsChips('a) <b>Adjectifs accrocheurs</b> :',
    ['ennuyeux', 'génial', 'fatigant', 'incroyable', 'plate', 'amusant', 'magique', 'gris', 'inoubliable'],
    's3_t3a', 'multi')
  .espace(8)
  .intro('<p style="font-weight:700;color:#2B2A26;margin:14px 0 6px;">Maintenant, écris 4 <b>verbes d\'action</b> qui pourraient apparaître sur ton affiche (exemple : <i>jouer</i>, <i>chanter</i>, <i>danser</i>…).</p>')
  .texte('<span class="de-letter">b)</span> Verbe 1 :', 's3_t3b1')
  .texte('<span class="de-letter">c)</span> Verbe 2 :', 's3_t3b2')
  .texte('<span class="de-letter">d)</span> Verbe 3 :', 's3_t3b3')
  .texte('<span class="de-letter">e)</span> Verbe 4 :', 's3_t3b4');

// ---------- Tâche 4 — Conjugaison à l'impératif ----------
d.exercice(4, "Tâche 4 — J'écris des phrases qui donnent un ordre amical", 6)
  .consigne("Pour convaincre, on utilise souvent l'impératif (« Viens ! », « Apporte… »). Conjugue chaque verbe à l'impératif, à la 2<sup>e</sup> personne du singulier (= comme si tu parlais à un ami).")
  .ligneAvecFleche('<span class="de-letter">a)</span> venir <span class="de-arrow">→</span>', 's3_t4a')
  .ligneAvecFleche('<span class="de-letter">b)</span> apporter ton sourire <span class="de-arrow">→</span>', 's3_t4b')
  .ligneAvecFleche('<span class="de-letter">c)</span> ne pas oublier la date <span class="de-arrow">→</span>', 's3_t4c')
  .espace(8)
  .intro('<p style="font-weight:700;color:#2B2A26;margin:6px 0;">Écris maintenant une phrase exclamative complète qui pourrait apparaître en gros sur ton affiche. Pense au point d\'exclamation ! (Exemple : <i>Viens vivre une journée magique !</i>)</p>')
  .texte('<span class="de-letter">d)</span> Ma phrase exclamative :', 's3_t4d');

// ---------- Tâche 5 — Rédaction de l'affiche ----------
d.exercice(5, "Tâche 5 — Je rédige mon affiche !", 12)
  .consigne("C'est le moment ! En t'aidant de toutes tes idées des tâches précédentes, rédige le texte complet de ton affiche.")
  .intro(
    '<div style="background:#F4F2EA;border-left:4px solid #C2543A;border-radius:8px;padding:14px 16px;margin:8px 0;">'
    + '<p style="margin:0 0 8px;font-weight:700;color:#2B2A26;">📋 Vérifie que ton affiche contient :</p>'
    + '<ul style="margin:0;padding-left:22px;color:#2B2A26;line-height:1.7;">'
    + '<li>Un <b>titre accrocheur</b> (en gros, qui donne envie)</li>'
    + '<li>La <b>date</b>, l\'<b>heure</b> et le <b>lieu</b></li>'
    + '<li>Les <b>activités</b> proposées (au moins 3)</li>'
    + '<li>Au moins <b>une phrase à l\'impératif</b> (« Viens ! »)</li>'
    + '<li>Une <b>phrase exclamative</b> pour convaincre</li>'
    + '<li>Des <b>majuscules</b> et de la <b>ponctuation</b> partout</li>'
    + '</ul>'
    + '</div>'
  )
  .redaction("Mon affiche pour la fête de fin d'année", 's3_t5', { hauteur: 320, placeholder: "Écris ici le texte de ton affiche…\n\n(Tu peux dessiner et décorer après sur une feuille séparée si tu veux !)" });

// ---------- Signature ----------
d.signoff('Bravo Cassie ! Prends ton temps, ton affiche va être superbe ! 🎉');
d.render();

  </script>
</body>
</html>
